<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>To Do List</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#5f9cff,#6c5ce7);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:25px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

.inputBox{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#6c5ce7;
color:white;
border-radius:8px;
cursor:pointer;
}

ul{
list-style:none;
margin-top:20px;
}

li{
background:#f1f1f1;
padding:10px;
margin-bottom:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.done{
text-decoration:line-through;
opacity:0.6;
}

.delete{
background:red;
border:none;
color:white;
padding:5px 8px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>
<body>

<div class="container">

<h1>My Tasks</h1>

<div class="inputBox">
<input id="taskInput" placeholder="Tambah tugas...">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

function render(){
let list = document.getElementById("taskList")
list.innerHTML=""

tasks.forEach((task,index)=>{

let li = document.createElement("li")

li.innerHTML = `
<span class="${task.done ? 'done':''}" onclick="toggle(${index})">${task.text}</span>
<button class="delete" onclick="removeTask(${index})">X</button>
`

list.appendChild(li)

})

localStorage.setItem("tasks",JSON.stringify(tasks))
}

function addTask(){

let input = document.getElementById("taskInput")
let text = input.value

if(text==="") return

tasks.push({text:text,done:false})

input.value=""

render()

}

function toggle(i){

tasks[i].done=!tasks[i].done
render()

}

function removeTask(i){

tasks.splice(i,1)
render()

}

render()

</script>

</body>
</html>
