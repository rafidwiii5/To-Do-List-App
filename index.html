<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>To Do List</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#a8c8ff,#c9b6ff);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
padding:25px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:15px;
}

.inputBox{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#6c7cff;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

ul{
list-style:none;
margin-top:20px;
padding:0;
}

li{
background:#f1f1f1;
padding:10px;
margin-bottom:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
animation:fadeIn .3s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.done{
text-decoration:line-through;
opacity:0.6;
}

.delete{
background:red;
border:none;
color:white;
padding:5px 8px;
border-radius:5px;
cursor:pointer;
}

.progress{
height:8px;
background:#eee;
border-radius:10px;
margin-top:15px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#6c7cff;
transition:0.3s;
}

.dark{
background:#0f172a;
color:white;
}

.dark .container{
background:rgba(30,41,59,0.9);
}

.dark li{
background:#334155;
}

.toggleDark{
margin-top:10px;
width:100%;
background:#222;
}

</style>

</head>
<body>

<div class="container">

<h1>My Tasks</h1>

<div class="inputBox">
<input id="taskInput" placeholder="Tambah tugas...">
<button onclick="addTask()">Add</button>
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<button class="toggleDark" onclick="toggleDark()">Dark Mode</button>

<ul id="taskList"></ul>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []

function render(){

let list = document.getElementById("taskList")
list.innerHTML=""

tasks.forEach((task,index)=>{

let li = document.createElement("li")

li.innerHTML = `
<span class="${task.done ? 'done':''}" onclick="toggle(${index})">${task.text}</span>
<button class="delete" onclick="removeTask(${index})">X</button>
`

list.appendChild(li)

})

updateProgress()

localStorage.setItem("tasks",JSON.stringify(tasks))

}

function addTask(){

let input = document.getElementById("taskInput")
let text = input.value.trim()

if(text==="") return

tasks.push({text:text,done:false})

input.value=""

render()

}

function toggle(i){

tasks[i].done=!tasks[i].done
render()

}

function removeTask(i){

tasks.splice(i,1)
render()

}

function updateProgress(){

let done = tasks.filter(t=>t.done).length
let percent = tasks.length ? (done/tasks.length)*100 : 0

document.getElementById("progressBar").style.width = percent+"%"

if(percent===100 && tasks.length>0){
confetti()
}

}

function toggleDark(){
document.body.classList.toggle("dark")
}

render()

</script>

</body>
</html>
